<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}">
    <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta name="twitter:card" content="summary">
    {{- range .Translations }}
    <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
    {{- end }}
    <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5568d3 0%, #65408b 100%);
        }
        /* Map layout */
        .freight-layout {
            display: flex;
            height: calc(100vh - 130px);
            min-height: 580px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }
        #sidebar {
            width: 300px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            overflow: hidden;
        }
        #region-list {
            flex: 1;
            overflow-y: auto;
        }
        #map-container {
            flex: 1;
            position: relative;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .region-card {
            padding: 10px 14px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            transition: background-color 0.15s;
            user-select: none;
        }
        .region-card:hover { background-color: #f8f9fa; }
        .region-card.active {
            background-color: #eff6ff;
            border-left: 3px solid #3b82f6;
        }
        .vessel-popup h6 { margin-bottom: 6px; }
        .vessel-popup .table td { padding: 2px 6px; font-size: 0.82rem; }
        .vessel-popup .table td:first-child { color: #6b7280; white-space: nowrap; }
        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; display: none;
        }
        @media (max-width: 768px) {
            .freight-layout { flex-direction: column; height: auto; }
            #sidebar { width: 100%; min-width: 100%; height: 200px; border-right: none; border-bottom: 1px solid #e5e7eb; }
            #map-container { height: 450px; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand text-decoration-none text-white" href="{{ "/" | relLangURL }}">🚢 {{ .Site.Title }}</a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <a class="text-white text-decoration-none small opacity-75" href="{{ "about" | relLangURL }}">{{ T "nav_about" }}</a>
                <div class="dropdown">
                    <button class="btn btn-sm btn-outline-light dropdown-toggle py-1" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        🌐 {{ .Site.Language.LanguageName }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        {{ range .Site.Languages }}
                        <li>
                            <a class="dropdown-item{{ if eq .Lang $.Site.Language.Lang }} active{{ end }}"
                               href="{{ if eq .Lang "en" }}/{{ else }}/{{ .Lang }}/{{ end }}">
                                {{ .LanguageName }}
                            </a>
                        </li>
                        {{ end }}
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="mt-5 py-4 bg-light">
        <div class="container text-center text-muted small">
            <p class="mb-1">{{ T "footer_tagline" }}</p>
            <p class="mb-0">{{ T "footer_data_credit" }} · {{ T "footer_refresh" }} · <a href="{{ "about" | relLangURL }}" class="text-muted">{{ T "nav_about" }}</a></p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Draw JS -->
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
</body>
</html>
