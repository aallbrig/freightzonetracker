<div class="freight-layout">
  <!-- Sidebar -->
  <div id="sidebar">
    <!-- Search -->
    <div class="p-2 border-bottom bg-light">
      <input type="text" id="regionSearch" class="form-control form-control-sm"
             placeholder="🔍 Search regions..." oninput="filterRegions(this.value)">
    </div>
    <!-- Region list -->
    <div id="region-list">
      <div class="p-3 text-center text-muted small">
        <div class="spinner-border spinner-border-sm me-1"></div> Loading regions…
      </div>
    </div>
    <!-- Stats panel -->
    <div id="stats-panel" class="border-top">
      <div id="stats-placeholder" class="p-3 text-muted small text-center">
        ← Select a region to view statistics
      </div>
      <div id="stats-content" class="p-3" style="display:none;">
        <div class="fw-semibold mb-1" id="stats-region-name"></div>
        <div class="row text-center mb-2">
          <div class="col">
            <div class="fs-5 fw-bold text-primary" id="stats-ships">0</div>
            <div class="small text-muted">Ships</div>
          </div>
          <div class="col">
            <div class="fs-5 fw-bold text-danger" id="stats-trains">0</div>
            <div class="small text-muted">Trains</div>
          </div>
          <div class="col">
            <div class="fs-5 fw-bold text-success" id="stats-trucks">0</div>
            <div class="small text-muted">Trucks</div>
          </div>
        </div>
        <div id="stats-flags" class="mb-1"></div>
        <div class="small text-muted" id="stats-updated"></div>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div id="map-container">
    <div id="map"></div>
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>
  </div>
</div>

<!-- Draw controls toolbar (shown above map on mobile) -->
<div class="mt-2 d-flex gap-2 align-items-center flex-wrap">
  <button class="btn btn-sm btn-outline-secondary" id="clearCustomZone" style="display:none;" onclick="clearCustomZone()">
    ✕ Clear custom zone
  </button>
  <div id="dataInfo" class="small text-muted ms-auto"></div>
</div>

<script>
(function () {
  // ── Wait for all map libraries ────────────────────────────────────────────
  function waitForLibs(cb) {
    if (typeof L !== 'undefined' && typeof L.MarkerClusterGroup !== 'undefined') {
      cb();
    } else {
      setTimeout(() => waitForLibs(cb), 100);
    }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let map, markersCluster, drawnItems, drawControl;
  let allRegions = [];
  let currentZone = null;
  let currentTransports = [];
  let customBounds = null;

  // ── Flag emoji ────────────────────────────────────────────────────────────
  function flagEmoji(iso2) {
    if (!iso2 || iso2.length !== 2) return '';
    try {
      return String.fromCodePoint(...iso2.toUpperCase().split('').map(c => 127397 + c.charCodeAt(0)));
    } catch { return ''; }
  }

  // ── Vessel icon ───────────────────────────────────────────────────────────
  function vesselIcon(type) {
    const glyphs = { ship: '🚢', train: '🚂', truck: '🚚' };
    return L.divIcon({
      html: `<div style="font-size:22px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">${glyphs[type] || '📦'}</div>`,
      className: '',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -14],
    });
  }

  // ── Vessel popup ──────────────────────────────────────────────────────────
  function vesselPopup(t) {
    const flag = flagEmoji(t.flag);
    const name = t.name || (t.mmsi ? `MMSI ${t.mmsi}` : 'Unknown vessel');
    const speed = t.speed != null ? `${t.speed} kn` : '—';
    const heading = t.heading != null ? `${t.heading}°` : '—';
    const dest = t.destination || '—';
    const rows = [
      ['Type', t.ship_type_name || t.type],
      ['Cargo', `${t.cargo_name || '—'} <small class="text-muted">(HS ${t.cargo_hs})</small>`],
      ['Flag', flag ? `${flag} ${t.flag_name || t.flag}` : (t.flag_name || '—')],
      ['Speed', speed],
      ['Heading', heading],
      ['Destination', dest],
      ['Position', `${t.position.lat.toFixed(4)}°, ${t.position.lon.toFixed(4)}°`],
    ];
    if (t.mmsi) rows.push(['MMSI', t.mmsi]);
    const tableRows = rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
    return `<div class="vessel-popup" style="min-width:220px">
      <h6 class="fw-semibold mb-2">${name}</h6>
      <table class="table table-sm table-borderless mb-0"><tbody>${tableRows}</tbody></table>
    </div>`;
  }

  // ── Region card HTML ──────────────────────────────────────────────────────
  function regionCardHTML(r) {
    const count = r.vessel_count || 0;
    const badge = count > 0
      ? `<span class="badge bg-primary rounded-pill">${count}</span>`
      : `<span class="badge bg-secondary rounded-pill">0</span>`;
    return `<div class="region-card" data-zone="${r.id}" data-name="${r.name.toLowerCase()}">
      <div class="d-flex justify-content-between align-items-start">
        <span class="fw-medium small">${r.name}</span>
        ${badge}
      </div>
      <div class="text-muted" style="font-size:0.73rem;line-height:1.3;margin-top:2px">
        ${r.description.length > 70 ? r.description.slice(0, 70) + '…' : r.description}
      </div>
    </div>`;
  }

  // ── Filter region list ────────────────────────────────────────────────────
  window.filterRegions = function (query) {
    const q = query.toLowerCase();
    document.querySelectorAll('.region-card').forEach(el => {
      el.style.display = el.dataset.name.includes(q) ? '' : 'none';
    });
  };

  // ── Select region ─────────────────────────────────────────────────────────
  function selectRegion(zone) {
    currentZone = zone;
    document.querySelectorAll('.region-card').forEach(el => {
      el.classList.toggle('active', el.dataset.zone === zone);
    });
    loadZoneData(zone);
  }

  // ── Load zone data ────────────────────────────────────────────────────────
  function loadZoneData(zone) {
    const overlay = document.getElementById('loading-overlay');
    overlay.style.display = 'flex';

    const r = allRegions.find(x => x.id === zone);
    if (r) {
      map.flyTo(r.center, r.zoom, { duration: 0.8 });
    }

    fetch(`/data/${zone}.json`)
      .then(res => {
        if (!res.ok) throw new Error(`No data for ${zone} (${res.status})`);
        return res.json();
      })
      .then(data => {
        overlay.style.display = 'none';
        currentTransports = data.transports || [];
        renderMarkers();
        updateStats(data);
      })
      .catch(err => {
        overlay.style.display = 'none';
        currentTransports = [];
        renderMarkers();
        document.getElementById('dataInfo').innerHTML =
          `<span class="text-warning">⚠ ${err.message}</span>`;
        document.getElementById('stats-placeholder').style.display = '';
        document.getElementById('stats-content').style.display = 'none';
      });
  }

  // ── Render markers ────────────────────────────────────────────────────────
  function renderMarkers() {
    markersCluster.clearLayers();
    const filtered = currentTransports.filter(t => {
      if (!customBounds) return true;
      return customBounds.contains([t.position.lat, t.position.lon]);
    });

    filtered.forEach(t => {
      const m = L.marker([t.position.lat, t.position.lon], { icon: vesselIcon(t.type) });
      m.bindPopup(vesselPopup(t), { maxWidth: 280 });
      markersCluster.addLayer(m);
    });

    const total = currentTransports.length;
    const shown = filtered.length;
    document.getElementById('dataInfo').innerHTML =
      customBounds && shown < total
        ? `Showing ${shown} of ${total} vessels in custom zone`
        : `${total} vessel${total !== 1 ? 's' : ''} in view`;
  }

  // ── Update stats panel ────────────────────────────────────────────────────
  function updateStats(data) {
    const s = data.stats || {};
    document.getElementById('stats-placeholder').style.display = 'none';
    document.getElementById('stats-content').style.display = '';
    document.getElementById('stats-region-name').textContent = data.zone_name || data.zone;
    document.getElementById('stats-ships').textContent = s.ships || 0;
    document.getElementById('stats-trains').textContent = s.trains || 0;
    document.getElementById('stats-trucks').textContent = s.trucks || 0;

    const flags = (s.top_flags || []).map(([code, count, name]) =>
      `<span class="me-2 small">${flagEmoji(code)} ${name || code} <strong>${count}</strong></span>`
    ).join('');
    document.getElementById('stats-flags').innerHTML = flags || '<span class="small text-muted">No flag data</span>';

    const ts = data.updated_at ? new Date(data.updated_at).toLocaleString() : '';
    document.getElementById('stats-updated').textContent = ts ? `Updated: ${ts}` : '';
  }

  // ── Clear custom zone ─────────────────────────────────────────────────────
  window.clearCustomZone = function () {
    drawnItems.clearLayers();
    customBounds = null;
    document.getElementById('clearCustomZone').style.display = 'none';
    renderMarkers();
  };

  // ── Initialize ────────────────────────────────────────────────────────────
  waitForLibs(function () {
    // Map
    map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // Cluster layer
    markersCluster = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 50,
    });
    map.addLayer(markersCluster);

    // Draw layer
    drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    drawControl = new L.Control.Draw({
      edit: { featureGroup: drawnItems },
      draw: { polygon: true, rectangle: true, circle: false, circlemarker: false, marker: false, polyline: false },
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
      drawnItems.clearLayers();
      drawnItems.addLayer(e.layer);
      customBounds = e.layer.getBounds();
      document.getElementById('clearCustomZone').style.display = '';
      renderMarkers();
    });
    map.on(L.Draw.Event.DELETED, function () {
      if (!drawnItems.getLayers().length) {
        customBounds = null;
        document.getElementById('clearCustomZone').style.display = 'none';
        renderMarkers();
      }
    });

    // Load regions index
    fetch('/data/regions.json')
      .then(res => res.ok ? res.json() : Promise.reject('regions.json not found'))
      .then(data => {
        allRegions = data.regions || [];
        const container = document.getElementById('region-list');
        if (!allRegions.length) {
          container.innerHTML = '<div class="p-3 text-muted small">No regions available. Run the CLI to populate data.</div>';
          return;
        }
        container.innerHTML = allRegions.map(regionCardHTML).join('');
        container.querySelectorAll('.region-card').forEach(el => {
          el.addEventListener('click', () => selectRegion(el.dataset.zone));
        });
        // Auto-select first region with data
        const first = allRegions.find(r => r.vessel_count > 0) || allRegions[0];
        if (first) selectRegion(first.id);
      })
      .catch(err => {
        document.getElementById('region-list').innerHTML =
          `<div class="p-3 text-warning small">⚠ Could not load regions: ${err}</div>`;
      });
  });
})();
</script>
